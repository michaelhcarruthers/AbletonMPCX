<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AMCPX</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a1a;
      color: #e0e0e0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top bar ── */
    #topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 18px;
      background: #111;
      border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
    }

    #topbar h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: #fff;
    }

    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
    }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    #messages::-webkit-scrollbar { width: 5px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

    .msg-row {
      display: flex;
    }
    .msg-row.user  { justify-content: flex-end; }
    .msg-row.assistant { justify-content: flex-start; }

    .bubble {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 14px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg-row.user .bubble {
      background: #1e3a5f;
      border-bottom-right-radius: 4px;
    }

    .msg-row.assistant .bubble {
      background: #2a2a2a;
      border-bottom-left-radius: 4px;
    }

    .bubble.thinking {
      color: #888;
      font-style: italic;
    }

    /* ── Tool call blocks ── */
    .tool-calls {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-width: 75%;
    }

    .tool-block {
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      overflow: hidden;
      font-family: "SFMono-Regular", "Menlo", "Monaco", "Consolas", monospace;
      font-size: 12px;
    }

    .tool-block summary {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      cursor: pointer;
      user-select: none;
      list-style: none;
      color: #22c55e;
      background: #151515;
    }
    .tool-block summary::-webkit-details-marker { display: none; }

    .tool-block summary::before {
      content: "▶";
      font-size: 9px;
      transition: transform 0.15s;
    }
    .tool-block[open] summary::before {
      transform: rotate(90deg);
    }

    .tool-block .tool-name {
      font-weight: 600;
    }

    .tool-block .tool-args {
      color: #888;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tool-block .tool-result {
      padding: 8px 10px;
      color: #e0e0e0;
      white-space: pre-wrap;
      word-break: break-word;
      border-top: 1px solid #2a2a2a;
    }

    /* ── Input bar ── */
    #inputbar {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: #111;
      border-top: 1px solid #2a2a2a;
      flex-shrink: 0;
    }

    #inputbar input {
      flex: 1;
      background: #222;
      border: 1px solid #333;
      border-radius: 10px;
      color: #e0e0e0;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    #inputbar input:focus { border-color: #1e3a5f; }
    #inputbar input::placeholder { color: #555; }
    #inputbar input:disabled { opacity: 0.5; cursor: not-allowed; }

    #send-btn {
      background: #1e3a5f;
      border: none;
      border-radius: 10px;
      color: #e0e0e0;
      padding: 10px 18px;
      font-size: 14px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    #send-btn:hover:not(:disabled) { background: #254a78; }
    #send-btn:disabled { opacity: 0.45; cursor: not-allowed; }
  </style>
</head>
<body>

<div id="topbar">
  <div id="status-dot"></div>
  <h1>AMCPX</h1>
</div>

<div id="messages"></div>

<div id="inputbar">
  <input id="input" type="text" placeholder="Message AMCPX…" autocomplete="off" />
  <button id="send-btn">Send</button>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('send-btn');

  // History array — same shape as OpenAI messages (role + content strings only)
  let history = [];

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function appendRow(role, contentEl) {
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;
    row.appendChild(contentEl);
    messagesEl.appendChild(row);
    scrollToBottom();
    return row;
  }

  function makeBubble(text, extraClass) {
    const el = document.createElement('div');
    el.className = 'bubble' + (extraClass ? ' ' + extraClass : '');
    el.textContent = text;
    return el;
  }

  function makeToolBlock(tc) {
    const details = document.createElement('details');
    details.className = 'tool-block';

    const summary = document.createElement('summary');

    const nameSpan = document.createElement('span');
    nameSpan.className = 'tool-name';
    nameSpan.textContent = tc.tool;

    const argsSpan = document.createElement('span');
    argsSpan.className = 'tool-args';
    argsSpan.textContent = JSON.stringify(tc.args);

    summary.appendChild(nameSpan);
    summary.appendChild(argsSpan);
    details.appendChild(summary);

    const resultDiv = document.createElement('div');
    resultDiv.className = 'tool-result';
    resultDiv.textContent = tc.result;
    details.appendChild(resultDiv);

    return details;
  }

  function setInputEnabled(enabled) {
    inputEl.disabled  = !enabled;
    sendBtn.disabled  = !enabled;
    if (enabled) inputEl.focus();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    setInputEnabled(false);

    // Show user bubble
    appendRow('user', makeBubble(text));
    history.push({ role: 'user', content: text });

    // Show thinking placeholder
    const thinkingBubble = makeBubble('thinking…', 'thinking');
    const thinkingRow = appendRow('assistant', thinkingBubble);

    let data;
    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history: history.slice(0, -1) }),
      });

      if (!res.ok) {
        const errText = await res.text();
        throw new Error(`Server error ${res.status}: ${errText}`);
      }

      data = await res.json();
    } catch (err) {
      thinkingRow.remove();
      appendRow('assistant', makeBubble(`⚠ ${err.message}`, ''));
      setInputEnabled(true);
      return;
    }

    // Remove thinking row
    thinkingRow.remove();

    // Render assistant reply
    if (data.reply) {
      appendRow('assistant', makeBubble(data.reply));
      history.push({ role: 'assistant', content: data.reply });
    }

    // Render tool call blocks
    if (data.tool_calls && data.tool_calls.length > 0) {
      const tcContainer = document.createElement('div');
      tcContainer.className = 'tool-calls';
      for (const tc of data.tool_calls) {
        tcContainer.appendChild(makeToolBlock(tc));
      }
      messagesEl.appendChild(tcContainer);
      scrollToBottom();
    }

    setInputEnabled(true);
  }

  sendBtn.addEventListener('click', sendMessage);
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Focus on load
  inputEl.focus();
</script>
</body>
</html>
