<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AMCPX Chat</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0d10;
      --panel: #13171c;
      --panel-2: #1a2027;
      --border: #2b3440;
      --text: #e8edf2;
      --muted: #9aa7b5;
      --accent: #4da3ff;
      --tool: #1a2230;
      --user: #1d2a1f;
      --assistant: #161b22;
      --danger: #ff6b6b;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .title {
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    .sub {
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }

    .wrap {
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr 340px;
    }

    .chat {
      min-height: 0;
      overflow-y: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .side {
      border-left: 1px solid var(--border);
      background: var(--panel);
      min-height: 0;
      overflow-y: auto;
      padding: 16px;
    }

    .side h3 {
      margin: 0 0 10px;
      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .card {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .msg {
      max-width: 900px;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 14px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .msg.user { background: var(--user); align-self: flex-end; }
    .msg.assistant { background: var(--assistant); align-self: flex-start; }
    .msg.system { background: var(--panel-2); align-self: center; color: var(--muted); }

    .role {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .composer {
      border-top: 1px solid var(--border);
      background: var(--panel);
      padding: 14px;
    }

    .composer-inner {
      max-width: 1260px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: end;
    }

    textarea {
      width: 100%;
      min-height: 58px;
      max-height: 220px;
      resize: vertical;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      padding: 12px 14px;
      font: inherit;
      outline: none;
    }

    button {
      height: 44px;
      border: 0;
      border-radius: 10px;
      padding: 0 16px;
      background: var(--accent);
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.55;
      cursor: default;
    }

    .tool-call {
      background: var(--tool);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      margin-top: 8px;
      font-size: 12px;
    }

    .tool-call pre {
      margin: 8px 0 0;
      white-space: pre-wrap;
      word-wrap: break-word;
      color: var(--muted);
    }

    .status {
      font-size: 12px;
      color: var(--muted);
    }

    .clear-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      margin-left: 8px;
    }

    @media (max-width: 980px) {
      .wrap { grid-template-columns: 1fr; }
      .side { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <div class="title">AMCPX Chat</div>
      <div class="sub">OpenAI-backed local control surface for Ableton tools</div>
    </div>
    <div>
      <button class="clear-btn" id="clearBtn" type="button">Clear</button>
    </div>
  </header>

  <div class="wrap">
    <main class="chat" id="chat">
      <div class="msg system">AMCPX ready.</div>
    </main>

    <aside class="side">
      <h3>Last Tool Calls</h3>
      <div id="toolPanel" class="card">
        <div class="status">No tool calls yet.</div>
      </div>
    </aside>
  </div>

  <section class="composer">
    <div class="composer-inner">
      <textarea id="input" placeholder="Type a command for Ableton..."></textarea>
      <button id="sendBtn" type="button">Send</button>
    </div>
  </section>

  <script>
    const chatEl = document.getElementById("chat");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");
    const clearBtn = document.getElementById("clearBtn");
    const toolPanel = document.getElementById("toolPanel");

    let history = [];

    function addMessage(role, content, toolCalls = []) {
      const msg = document.createElement("div");
      msg.className = `msg ${role}`;

      const roleEl = document.createElement("div");
      roleEl.className = "role";
      roleEl.textContent = role;

      const body = document.createElement("div");
      body.textContent = content || "";

      msg.appendChild(roleEl);
      msg.appendChild(body);

      chatEl.appendChild(msg);
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function renderToolPanel(toolCalls) {
      if (!toolCalls || !toolCalls.length) {
        toolPanel.innerHTML = `<div class="status">No tool calls yet.</div>`;
        return;
      }

      toolPanel.innerHTML = "";
      for (const tc of toolCalls.slice().reverse()) {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `<strong>${tc.tool}</strong><pre>${JSON.stringify(tc.args, null, 2)}</pre>`;
        toolPanel.appendChild(card);
      }
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      addMessage("user", text);
      history.push({ role: "user", content: text });
      inputEl.value = "";
      sendBtn.disabled = true;

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            message: text,
            history: history
          })
        });

        const data = await res.json();

        addMessage("assistant", data.reply || "", data.tool_calls || []);
        history.push({ role: "assistant", content: data.reply || "" });
      } catch (err) {
        addMessage("assistant", `Request failed: ${err}`);
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    sendBtn.addEventListener("click", sendMessage);

    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    clearBtn.addEventListener("click", () => {
      history = [];
      chatEl.innerHTML = `<div class="msg system">AMCPX ready.</div>`;
      renderToolPanel([]);
    });
  </script>
</body>
</html>
